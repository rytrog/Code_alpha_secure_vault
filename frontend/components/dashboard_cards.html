<div class="stats-grid">
    <!-- Total Users -->
    <div class="stat-card">
        <div class="stat-icon blue">USERS</div>
        <div class="stat-value" id="totalUsers">-</div>
        <div class="stat-label">Total Users</div>
    </div>
    <!-- Encrypted Vault Items -->
    <div class="stat-card">
        <div class="stat-icon green">VAULT</div>
        <div class="stat-value" id="encryptedRecords">-</div>
        <div class="stat-label">Encrypted Records</div>
    </div>
    <!-- Total Inspected Traffic -->
    <div class="stat-card">
        <div class="stat-icon purple">TRAFFIC</div>
        <div class="stat-value" id="todayRequests">-</div>
        <div class="stat-label">Inspected Requests</div>
    </div>
    <!-- Blocked Requests -->
    <div class="stat-card">
        <div class="stat-icon red">BLOCKED</div>
        <div class="stat-value" id="blockedRequests">-</div>
        <div class="stat-label">Blocked Attacks</div>
    </div>
    <!-- Successful Logins -->
    <div class="stat-card">
        <div class="stat-icon green">SUCCESS</div>
        <div class="stat-value" id="successfulLogins">-</div>
        <div class="stat-label">Successful Logins</div>
    </div>
    <!-- Failed Logins -->
    <div class="stat-card">
        <div class="stat-icon red">FAILURE</div>
        <div class="stat-value" id="failedLogins">-</div>
        <div class="stat-label">Failed Logins</div>
    </div>
</div>
