<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SentinelX AI Security Assistant - Chat with your security AI">
    <title>SentinelX - AI Assistant</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 160px); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
        .chat-input-bar { display: flex; gap: 12px; padding: 16px; background: var(--bg-card); border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
        .chat-input-bar input { flex: 1; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div id="navbar"></div>

            <div class="flex-between mb-16">
                <h3 style="font-size:16px;font-weight:600">AI Security Assistant</h3>
                <button class="btn btn-outline btn-sm" onclick="clearChat()">Clear Chat</button>
            </div>

            <div class="chat-container animate-fade-in-up">
                <div class="chat-messages" id="chatMessages">
                    <div class="loading-spinner"></div>
                </div>
                <form class="chat-input-bar" id="chatForm">
                    <input type="text" class="form-input" id="chatInput" placeholder="Ask about security events, attack patterns, or system health..." required>
                    <button type="submit" class="btn btn-primary">Send</button>
                </form>
            </div>

            <div id="footer" class="mt-24"></div>
        </main>
    </div>

    <div class="toast-container"></div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ai.js"></script>
    <script>
        loadComponent('sidebar', 'sidebar.html').then(() => {
            const el = document.getElementById('nav-ai');
            if (el) el.classList.add('active');
        });
        loadComponent('navbar', 'navbar.html').then(() => {
            const pt = document.getElementById('pageTitle');
            if (pt) pt.innerHTML = 'AI Assistant';
        });
        loadComponent('footer', 'footer.html');
    </script>
</body>
</html>
