<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SentinelX User Profile - Account settings and activity">
    <title>SentinelX - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div id="navbar"></div>

            <div class="animate-fade-in-up" style="max-width:600px">
                <div class="card mb-24">
                    <h3 style="font-size:16px;font-weight:600;margin-bottom:20px">Account Information</h3>
                    <div id="profileInfo">
                        <div class="loading-spinner"></div>
                    </div>
                </div>

                <div class="card mb-24">
                    <h3 style="font-size:16px;font-weight:600;margin-bottom:20px">System Health</h3>
                    <div id="systemHealth">
                        <div class="loading-spinner"></div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Danger Zone</h3>
                    <button class="btn btn-danger" onclick="logout()">Logout</button>
                </div>
            </div>

            <div id="footer" class="mt-24"></div>
        </main>
    </div>

    <div class="toast-container"></div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        loadComponent('sidebar', 'sidebar.html').then(() => {
            const el = document.getElementById('nav-profile');
            if (el) el.classList.add('active');
        });
        loadComponent('navbar', 'navbar.html').then(() => {
            const pt = document.getElementById('pageTitle');
            if (pt) pt.innerHTML = 'Profile';
        });
        loadComponent('footer', 'footer.html');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!requireAuth()) return;
            updateUserBadge();

            // Load profile
            try {
                const res = await api.get('/users/me');
                if (res?.data) {
                    const u = res.data;
                    document.getElementById('profileInfo').innerHTML = `
                        <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
                            <div style="width:64px;height:64px;border-radius:50%;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:white">${u.username.charAt(0).toUpperCase()}</div>
                            <div>
                                <h4 style="font-size:18px;font-weight:700">${escapeHtml(u.username)}</h4>
                                <span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role}</span>
                            </div>
                        </div>
                        <div style="display:grid;gap:12px">
                            <div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-muted)">Email</span><span>${escapeHtml(u.email)}</span></div>
                            <div class="flex-between" style="padding:10px 0;border-bottom:1px solid var(--border-color)"><span style="color:var(--text-muted)">Status</span><span class="badge ${u.is_active ? 'badge-safe' : 'badge-high'}">${u.is_active ? 'Active' : 'Disabled'}</span></div>
                            <div class="flex-between" style="padding:10px 0"><span style="color:var(--text-muted)">Joined</span><span>${formatDate(u.created_at)}</span></div>
                        </div>
                    `;
                }
            } catch (err) { document.getElementById('profileInfo').innerHTML = '<p style="color:var(--accent-red)">Failed to load profile</p>'; }

            // Load health
            try {
                const res = await api.get('/health/detailed');
                if (res?.data) {
                    const h = res.data;
                    const statusIcon = (s) => {
                        if (s === 'operational') {
                            return `<span style="color:var(--accent-green);font-weight:bold;margin-right:6px">✓</span> <span style="color:var(--accent-green)">Operational</span>`;
                        } else if (s === 'not configured') {
                            return `<span style="color:var(--accent-orange);font-weight:bold;margin-right:6px">!</span> <span style="color:var(--accent-orange)">Not Configured</span>`;
                        } else {
                            return `<span style="color:var(--accent-red);font-weight:bold;margin-right:6px">✘</span> <span style="color:var(--accent-red)">Error</span>`;
                        }
                    };
                    document.getElementById('systemHealth').innerHTML = `
                        <div style="display:grid;gap:12px">
                            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border-color)"><span>API Status</span><span>${statusIcon(h.api_status)}</span></div>
                            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border-color)"><span>Database</span><span>${statusIcon(h.database_status)}</span></div>
                            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border-color)"><span>Authentication</span><span>${statusIcon(h.auth_status)}</span></div>
                            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border-color)"><span>Encryption</span><span>${statusIcon(h.encryption_status)}</span></div>
                            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border-color)"><span>AI Engine</span><span>${statusIcon(h.ai_status)}</span></div>
                            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border-color)"><span>Security Score</span><span style="font-weight:700;color:var(--accent-blue)">${h.security_score}/100</span></div>
                            <div class="flex-between" style="padding:8px 0"><span>Overall</span><span class="badge ${h.overall === 'healthy' ? 'badge-safe' : 'badge-high'}">${h.overall}</span></div>
                        </div>
                    `;
                }
            } catch (err) { document.getElementById('systemHealth').innerHTML = '<p style="color:var(--accent-red)">Failed to load health</p>'; }
        });
    </script>
</body>
</html>
