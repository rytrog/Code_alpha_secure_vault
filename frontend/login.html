<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SentinelX - AI-Powered Cloud Secure Data Vault & SQL Injection Defense Platform">
    <title>SentinelX - Secure Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card animate-fade-in-up">
                <div class="auth-logo">
                    <div class="icon">SX</div>
                    <h1>SentinelX</h1>
                    <p>Sign in to your secure dashboard</p>
                </div>

                <div class="auth-error" id="authError"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="form-input-wrapper">
                            <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="password-toggle">Show</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
